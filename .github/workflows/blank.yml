name: Test Ultra-Low LTX MLX (Smoke Test Only)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-ltx-ultralow:
    runs-on: macos-14
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5 # Updated to latest stable major version
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          # Use uv to sync/install directly into the environment
          uv pip install --system mlx torch
          uv pip install --system "git+https://github.com/Blaizzy/mlx-video.git"

      - name: Log system and MLX info
        run: |
          echo "=== System Memory ==="
          sysctl hw.memsize
          vm_stat
          
          echo "=== Python / MLX / MPS Info ==="
          python3 - <<'PY'
          import sys
          import torch
          import mlx.core as mx
          print(f"Python: {sys.version}")
          print(f"PyTorch MPS available: {torch.backends.mps.is_available()}")
          try:
              print(f"MLX device: {mx.default_device()}")
          except Exception as e:
              print(f"MLX info error: {e}")
          PY

      - name: Ultra-low LTX smoke test
        continue-on-error: true
        run: |
          echo "=== Starting ultra-low LTX test ==="
          
          # Simplified discovery and execution
          MODULE_PATH="mlx_video.models.ltx_2.generate"
          
          if python3 -c "import importlib.util; exit(0 if importlib.util.find_spec('$MODULE_PATH') else 1)"; then
            echo "Using python -m $MODULE_PATH"
            python3 -m $MODULE_PATH \
              --prompt "A simple red ball bouncing slowly on a white background" \
              --width 256 \
              --height 256 \
              --num-frames 9 \
              --seed 42 \
              --output-path smoke_test.mp4
          else
            echo "LTX entrypoint not found. Listing available mlx_video modules:"
            python3 -c "import pkgutil, mlx_video; [print(m.name) for m in pkgutil.walk_packages(mlx_video.__path__, 'mlx_video.') if 'ltx' in m.name]"
          fi

      - name: Final memory check
        if: always()
        run: |
          echo "=== Final Memory Summary ==="
          top -l 1 | head -n 20
          ls -lh smoke_test.mp4 || echo "No output file generated."
