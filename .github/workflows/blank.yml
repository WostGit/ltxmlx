name: Test Ultra-Low LTX MLX (Smoke Test Only)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-ltx-ultralow:
    runs-on: macos-14

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip

          # Install MLX + PyTorch, then install mlx-video from GitHub
          uv pip install mlx torch
          uv pip install git+https://github.com/Blaizzy/mlx-video.git

      - name: Log system and MLX info
        run: |
          source .venv/bin/activate

          echo "=== System Memory ==="
          sysctl hw.memsize
          top -l 1 | head -n 15

          echo "=== Python / MLX / MPS Info ==="
          python - <<'PY'
          import sys
          import torch
          import mlx.core as mx

          print("Python:", sys.version)
          print("PyTorch MPS available:", torch.backends.mps.is_available())
          try:
              print("MLX Metal device:", mx.metal.device_info())
          except Exception as e:
              print("MLX Metal device info unavailable:", e)
          PY

      - name: Ultra-low LTX smoke test
        continue-on-error: true
        run: |
          source .venv/bin/activate

          echo "=== Starting ultra-low LTX test ==="
          echo "Using CLI/module entrypoint instead of importing internal functions"

          python -m mlx_video.ltx_2.generate \
            --prompt "A simple red ball bouncing slowly on a white background" \
            --width 256 \
            --height 256 \
            --num-frames 9 \
            --seed 42 \
            --output smoke_test.mp4 || true

          echo "=== Smoke test finished ==="
          ls -lah || true

      - name: Final memory check
        if: always()
        run: |
          echo "=== Final Memory Summary ==="
          top -l 1 | head -n 20
          echo "Workflow completed."
